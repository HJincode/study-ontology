name: exm-ontology-intermediate
services:
  neo4j:
    image: neo4j:5.15.0
    container_name: neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (http)
      - "7687:7687"   # Bolt driver connection
    environment:
      NEO4J_AUTH: neo4j/neo4jpass   # <username>/<password>
      NEO4J_PLUGINS: '["apoc", "n10s"]' # 유용 플러그인 예시. 필요 없으면 삭제
      NEO4J_dbms_memory_pagecache_size: 1G   # 적절히 메모리 조정
      NEO4J_dbms_memory_heap_initial__size: 1G
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # (필요시 import 디렉토리 등 추가)
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: